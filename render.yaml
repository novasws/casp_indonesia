databases:
  - name: casp-indonesia-db
    databaseName: casp_indonesia
    user: casp_user
    plan: free

services:
  - type: web
    name: casp-indonesia
    env: docker
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: true
      - key: APP_KEY
        value: "base64:AJKkD1xlid6CkRe/uBehzNJsDq+PBlJSYjIC2CjaYIo="
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: casp-indonesia-db
          property: connectionString
      - key: SESSION_DRIVER
        value: cookie
